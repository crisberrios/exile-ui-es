name: Build and Release

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Pull latest Exile-UI
        run: uv run exile-ui-es pull

      - name: Translate to Spanish
        run: uv run exile-ui-es translate

      - name: Generate patches
        run: uv run exile-ui-es patch

      - name: Create bundle
        run: uv run exile-ui-es bundle --output bundle/

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: exile-ui-es-bundle
          path: bundle/